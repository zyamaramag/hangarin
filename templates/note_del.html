{% extends 'base.html' %}
{% load static %}

{% block title %}Delete Note - Hangarin{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h5 class="card-title mb-0 text-danger">Delete Note</h5>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <p class="alert alert-warning">
                        <i class="fas fa-exclamation-triangle"></i>
                        Are you sure you want to delete this note for task "<strong>{{ object.task.title }}</strong>"?
                    </p>
                    
                    <button type="submit" class="btn btn-danger">
                        <i class="fas fa-trash"></i> Yes, Delete
                    </button>
                    <a href="{% url 'note-list' %}" class="btn btn-secondary">
                        <i class="fas fa-times"></i> Cancel
                    </a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
